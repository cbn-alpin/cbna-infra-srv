x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: 4m
    max-file: 10

services:
  
  captcha-cap:
    image: tiago2/cap:2.0.4 
    container_name: captcha-cap
    hostname: "${HOSTNAME}_cap"
    restart: unless-stopped
    expose:
      - 3000
    environment:
      ADMIN_KEY: "${CAP_ADMIN_KEY}"
      HIDE_RATELIMIT_IP_WARNING: "${CAP_HIDE_RATELIMIT_IP_WARNING:-true}"
      TZ: "${TZ:-Europe/Paris}"
      VIRTUAL_HOST: "${DOMAINS}"
      LETSENCRYPT_HOST: "${DOMAINS}"
    logging: *default-logging
    volumes:
      - data-cap-storage:/usr/src/app/.data

volumes:
  data-cap-storage:

networks:
  default:
    name: nginx-proxy
    external: true
